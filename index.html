<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MODA | Luxury Fashion Story</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html">MODA</a>
      <a class="header-link" href="#collection">Collection</a>
    </header>

    <main>
      <section class="home-hero">
        <img src="images/prod1/style2.jpg" alt="Luxury fashion hero" />
        <div class="home-hero-overlay"></div>
        <div class="home-hero-content">
          <p class="eyebrow light">New Collection</p>
          <h1>MODA</h1>
          <p>Minimal luxury silhouettes crafted for modern everyday styling.</p>
          <a href="#collection" class="cta">Explore Collection</a>
        </div>
      </section>

      <section class="collection" id="collection">
        <div class="section-head">
          <h2>Curated Essentials</h2>
        </div>
        <div class="product-grid">
          <a class="product-card" href="product1.html">
            <div class="product-image"><img src="images/prod1/style1.jpg" alt="Blue Oxford Shirt" /></div>
            <div class="product-copy">
              <h3>Blue Oxford Shirt</h3>
              <p>$129</p>
            </div>
          </a>

          <a class="product-card" href="product2.html">
            <div class="product-image"><img src="images/prod2/style1.jpg" alt="White Linen Shirt" /></div>
            <div class="product-copy">
              <h3>White Linen Shirt</h3>
              <p>$139</p>
            </div>
          </a>

          <a class="product-card" href="product3.html">
            <div class="product-image"><img src="images/prod3/style1.jpg" alt="Black Casual Shirt" /></div>
            <div class="product-copy">
              <h3>Black Casual Shirt</h3>
              <p>$119</p>
            </div>
          </a>

          <a class="product-card" href="product4.html">
            <div class="product-image"><img src="images/prod4/style1.jpg" alt="Denim Shirt" /></div>
            <div class="product-copy">
              <h3>Denim Shirt</h3>
              <p>$149</p>
            </div>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
